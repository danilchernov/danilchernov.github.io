<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Components 🤘
  </title>
  <link rel="stylesheet" href="css/vendor.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body class="body">
  <div class="body__wrapper">
    <header class="body__header">
      <div class="header block">
        <div class="header__wrapper block__wrapper">
          <div class="header__side"><a class="header__logo logo" href="#"><img src="images/logo.png" alt="Логотип" /></a><span>Парнёрская программа</span></div>
        </div>
      </div>
    </header>
    <main class="body__content">
      <div class="ui block">
        <div class="block__wrapper">
          <h1>Buttons ✅</h1>
          <ul class="ui__list">
            <li class="ui__item">
              <button class="button button_box-shadow" type="button"><span class="button__content"><span class="button__title">Стать партнёром</span></span></button>
            </li>
            <li class="ui__item">
              <button class="button button_box-shadow is-hover" type="button"><span class="button__content"><span class="button__title">Стать партнёром</span></span></button>
            </li>
            <li class="ui__item">
              <button class="button button_box-shadow is-active" type="button"><span class="button__content"><span class="button__title">Стать партнёром</span></span></button>
            </li>
            <li class="ui__item">
              <button class="button button_box-shadow button_full" type="button"><span class="button__content"><span class="button__title">Стать партнёром</span></span></button>
            </li>
          </ul>
        </div>
      </div>
    </main>
    <footer class="body__footer">
      <div class="footer block">
        <div class="footer__wrapper block__wrapper">
          <h1>Hello, I'm Footer</h1>
        </div>
      </div>
    </footer>
  </div>
  <script src="scripts/vendor.js" defer="defer"></script>
  <script src="scripts/main.js" defer="defer"></script>
</body>

</html>
